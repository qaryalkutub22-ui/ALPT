<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار اللغة العربية</title>
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS (Abaikan peringatan di console saat menjalankan versi statis HTML) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel Standalone -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Gunakan versi Babel spesifik untuk memperbaiki eror runtime browser -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .font-arabic { font-family: 'Tajawal', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease forwards; }
    </style>
</head>
<body class="bg-[#FDFDFD] text-slate-800 overflow-x-hidden">
    <div id="root"></div>

    <!-- Logika Aplikasi React terintegrasi Firebase (Menggunakan data-type="module") -->
    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : JSON.stringify({
            apiKey: "AIzaSyDQYYLRfvLFvk023FSflKDi6hQUSX4Jed4",
            authDomain: "arabic-language-placement-test.firebaseapp.com",
            projectId: "arabic-language-placement-test",
            storageBucket: "arabic-language-placement-test.firebasestorage.app",
            messagingSenderId: "431606829904",
            appId: "1:431606829904:web:81705ff38610fb4bd31255"
        });
        
        const firebaseConfig = JSON.parse(firebaseConfigStr);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : "arabic-language-placement-test";

        const { useState, useEffect, useRef } = window.React;
        
        const Icon = ({ name, size = 24, className = "", strokeWidth = 2 }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        elements: [containerRef.current.firstChild],
                        attrs: { width: size, height: size, 'stroke-width': strokeWidth, class: className }
                    });
                }
            }, [name, size, className, strokeWidth]);
            return <span ref={containerRef} className="inline-flex items-center justify-center leading-none"></span>;
        };

        const SECTION_INSTRUCTIONS = {
            masmu: {
                header: "القسم الأول: فهم المسموع",
                rules: [
                    "١- يشتمل هذا القسم على أربعة مقاطع صوتية.",
                    "٢- يتبع كل مقطع عدد من أسئلة الاختيار من متعدد.",
                    "٣- يُنصح بقراءة الأسئلة قبل الاستماع إلى المقطع الصوتي.",
                    "٤- يتوفر لكل سؤال أربعة بدائل، إجابة واحدة منها فقط هي الصحيحة.",
                    "٥- للإجابة، انقر فوق الخيار الذي تعتقد أنه الصحيح."
                ]
            },
            maqru: {
                header: "القسم الثاني: فهم المقروء",
                rules: [
                    "١- يشتمل هذا القسم على ثلاثة نصوص قرائية.",
                    "٢- يتبع كل نص مجموعة من أسئلة الاختيار من متعدد.",
                    "٣- يتوفر لكل سؤال أربعة بدائل، إجابة واحدة منها فقط هي الصحيحة.",
                    "٤- قم بالنقر على الخيار الذي تراه صائباً لاعتماده كإجابة."
                ]
            },
            muradifat: {
                header: "القسم الثالث: اختبار المفردات والتراكيب",
                rules: [
                    "١- يضم هذا القسم خمسة وثلاثين (٣٥) سؤالاً.",
                    "٢- لكل سؤال أربعة بدائل، خيار واحد منها فقط هو الإجابة الصحيحة.",
                    "٣- انقر على الخيار الذي تعتقد بصحته لتسجيل إجابتك."
                ]
            }
        };

        const CATEGORY_ORDER = { masmu: 1, maqru: 2, muradifat: 3 };

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home'); 
            const [sections, setSections] = useState([]);
            const [answers, setAnswers] = useState({});
            const [submitted, setSubmitted] = useState(false);
            const [score, setScore] = useState(0);
            const [timeLeft, setTimeLeft] = useState(75 * 60);
            const [timerActive, setTimerActive] = useState(false);
            const [isAdminAuth, setIsAdminAuth] = useState(false);
            const [adminPassInput, setAdminPassInput] = useState('');
            const [showReview, setShowReview] = useState(false);
            const [feedback, setFeedback] = useState({ show: false, message: '', type: 'info' });
            const [isUploading, setIsUploading] = useState(false);

            // State Manajemen Admin
            const [newSection, setNewSection] = useState({ title: '', type: 'muradifat', mediaUrl: '', passage: '', questions: [] });
            const [importText, setImportText] = useState('');
            const [targetSectionId, setTargetSectionId] = useState('');
            const [activeQuestionForm, setActiveQuestionForm] = useState(null);
            const [manualQuestion, setManualQuestion] = useState({ text: '', options: ['', '', '', ''], correct: 0 });
            
            // Modal States
            const [confirmSubmitModal, setConfirmSubmitModal] = useState(false);
            const [deleteModal, setDeleteModal] = useState({ show: false, message: '', onConfirm: null });

            // State Manajemen Admin (Edit Judul)
            const [editingSectionId, setEditingSectionId] = useState(null);
            const [editTitleValue, setEditTitleValue] = useState('');

            // Inisialisasi Auth Firebase
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) {
                        console.error("Auth error:", err);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // Ambil Data Firestore
            useEffect(() => {
                if (!user) return;
                
                const sectionsRef = collection(db, 'artifacts', appId, 'public', 'data', 'sections');
                const unsubscribe = onSnapshot(query(sectionsRef), (snapshot) => {
                    const data = snapshot.docs.map(docRef => ({ id: docRef.id, ...docRef.data() }));
                    setSections(data);
                    if (data.length > 0 && !targetSectionId) setTargetSectionId(data[0].id);
                }, (err) => {
                    console.error("Firestore Error:", err);
                    showFeedback("Gagal memuat data", "error");
                });

                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                let timer;
                if (view === 'test' && timerActive && timeLeft > 0 && !submitted) {
                    timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                } else if (timeLeft === 0 && timerActive && !submitted) {
                    calculateScore();
                }
                return () => clearInterval(timer);
            }, [view, timerActive, timeLeft, submitted]);

            useEffect(() => {
                if (view === 'test' && !submitted) setTimerActive(true);
                else if (view === 'home') {
                    setTimeLeft(75 * 60);
                    setTimerActive(false);
                    setShowReview(false);
                    setSubmitted(false);
                    setAnswers({});
                }
            }, [view, submitted]);

            const showFeedback = (msg, type = 'info') => {
                setFeedback({ show: true, message: msg, type });
                setTimeout(() => setFeedback({ show: false, message: '', type: 'info' }), 4000);
            };

            const calculateScore = () => {
                let totalQuestions = 0;
                let correctAnswers = 0;
                
                sections.forEach(sec => {
                    if (sec.questions && Array.isArray(sec.questions)) {
                        sec.questions.forEach((q, idx) => {
                            totalQuestions++;
                            if (answers[`${sec.id}_${idx}`] === q.correct) {
                                correctAnswers++;
                            }
                        });
                    }
                });
                
                const finalScore = totalQuestions > 0 ? Math.round((correctAnswers / totalQuestions) * 100) : 0;
                setScore(finalScore);
                setSubmitted(true);
                setTimerActive(false);
                setConfirmSubmitModal(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminPassInput === 'admin123') {
                    setIsAdminAuth(true);
                    showFeedback("تم تسجيل الدخول بنجاح", "success");
                } else showFeedback("كلمة المرور خاطئة", "error");
            };

            // Handlers Manajemen Admin
            const handleAudioFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 800000) { 
                    showFeedback("File terlalu besar! Maksimal 800KB.", "error");
                    e.target.value = null;
                    return;
                }
                setIsUploading(true);
                const reader = new FileReader();
                reader.onload = (event) => {
                    setNewSection(prev => ({ ...prev, mediaUrl: event.target.result }));
                    setIsUploading(false);
                };
                reader.readAsDataURL(file);
            };

            const handleAddSection = async (e) => {
                e.preventDefault();
                if (!newSection.title.trim()) return showFeedback("Isi judul bagian!", "error");
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'sections'), {
                        ...newSection,
                        createdAt: Date.now()
                    });
                    setNewSection({ title: '', type: 'muradifat', mediaUrl: '', passage: '', questions: [] });
                    showFeedback("Bagian berhasil dibuat!", "success");
                } catch (err) { console.error(err); }
            };

            const deleteSection = async (id) => {
                setDeleteModal({
                    show: true,
                    message: 'هل أنت متأكد من حذف هذا القسم بالكامل؟',
                    onConfirm: async () => {
                        try {
                            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sections', id));
                            showFeedback("تم حذف القسم بنجاح", "success");
                        } catch (err) { console.error(err); }
                        setDeleteModal({ show: false, message: '', onConfirm: null });
                    }
                });
            };

            const handleUpdateSectionTitle = async (id) => {
                if (!editTitleValue.trim()) return showFeedback("العنوان لا يمكن أن يكون فارغاً", "error");
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sections', id), {
                        title: editTitleValue
                    });
                    setEditingSectionId(null);
                    setEditTitleValue('');
                    showFeedback("تم تحديث العنوان بنجاح", "success");
                } catch (err) { 
                    console.error(err);
                    showFeedback("حدث خطأ", "error");
                }
            };

            const handleSaveManualQuestion = async (sectionId) => {
                const section = sections.find(s => s.id === sectionId);
                if (!section || !manualQuestion.text.trim()) return;
                const updatedQuestions = [...(section.questions || []), { ...manualQuestion }];
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sections', sectionId), {
                        questions: updatedQuestions
                    });
                    setManualQuestion({ text: '', options: ['', '', '', ''], correct: 0 });
                    setActiveQuestionForm(null);
                    showFeedback("تمت إضافة السؤال", "success");
                } catch (err) { console.error(err); }
            };

            const deleteSpecificQuestion = async (sectionId, qIndex) => {
                setDeleteModal({
                    show: true,
                    message: 'هل أنت متأكد من حذف هذا السؤال؟',
                    onConfirm: async () => {
                        const section = sections.find(s => s.id === sectionId);
                        if (!section) return;
                        const updatedQuestions = section.questions.filter((_, idx) => idx !== qIndex);
                        try {
                            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sections', sectionId), {
                                questions: updatedQuestions
                            });
                            showFeedback("تم حذف السؤال", "success");
                        } catch (err) { console.error(err); }
                        setDeleteModal({ show: false, message: '', onConfirm: null });
                    }
                });
            };

            const handleQuickImport = async () => {
                if (!targetSectionId) return showFeedback("Pilih bagian target!", "error");
                const section = sections.find(s => s.id === targetSectionId);
                if (!section) return;
                const lines = importText.split('\n').filter(l => l.trim().includes('|'));
                if (lines.length === 0) return showFeedback("Format salah!", "error");
                const newQs = lines.map(line => {
                    const parts = line.split('|');
                    return { text: parts[0].trim(), options: parts[1].split(',').map(o => o.trim()), correct: parseInt(parts[2]?.trim()) || 0 };
                });
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sections', targetSectionId), {
                        questions: [...(section.questions || []), ...newQs]
                    });
                    showFeedback("تم الاستيراد بنجاح", "success");
                    setImportText('');
                } catch (err) { console.error(err); }
            };

            const getGradeInfo = (s) => {
                if (s >= 95) return { text: "ممتاز مرتفع", color: "text-emerald-600", bg: "bg-emerald-50" };
                if (s >= 90) return { text: "ممتاز", color: "text-emerald-500", bg: "bg-emerald-50" };
                if (s >= 85) return { text: "جيد جداً مرتفع", color: "text-blue-600", bg: "bg-blue-50" };
                if (s >= 80) return { text: "جيد جداً", color: "text-blue-500", bg: "bg-blue-50" };
                if (s >= 75) return { text: "جيد مرتفع", color: "text-indigo-600", bg: "bg-indigo-50" };
                if (s >= 70) return { text: "جيد", color: "text-indigo-500", bg: "bg-indigo-50" };
                if (s >= 65) return { text: "مقبول مرتفع", color: "text-amber-600", bg: "bg-amber-50" };
                if (s >= 60) return { text: "مقبول", color: "text-amber-500", bg: "bg-amber-50" };
                return { text: "راسب", color: "text-red-600", bg: "bg-red-50" };
            };

            const gradeInfo = getGradeInfo(score);
            
            // Pengurutan Utama: Kategori (Masmu -> Maqru -> Muradifat) lalu Waktu Pembuatan
            const sortedSections = [...sections].sort((a, b) => {
                if (CATEGORY_ORDER[a.type] !== CATEGORY_ORDER[b.type]) {
                    return CATEGORY_ORDER[a.type] - CATEGORY_ORDER[b.type];
                }
                return (a.createdAt || 0) - (b.createdAt || 0);
            });

            // Fungsi untuk menampilkan instruksi
            const renderInstructions = (type) => {
                const instr = SECTION_INSTRUCTIONS[type];
                if (!instr) return null;
                return (
                    <div className="bg-slate-100 border-r-[6px] sm:border-r-[8px] border-emerald-800 p-5 sm:p-8 rounded-2xl sm:rounded-3xl mb-8 sm:mb-12 text-right shadow-sm animate-fade-in mx-4 sm:mx-0" dir="rtl">
                        <h3 className="text-xl sm:text-2xl font-black text-slate-900 mb-4 sm:mb-6 flex items-center gap-2 sm:gap-3 justify-start font-arabic">
                            <div className="bg-emerald-800 text-white p-2 sm:p-2 rounded-xl">
                                <Icon name="info" size={24} className="w-5 h-5 sm:w-6 sm:h-6" />
                            </div>
                            <span>{instr.header}</span>
                        </h3>
                        <p className="font-bold text-slate-800 mb-3 sm:mb-4 text-base sm:text-lg font-arabic">يُرجى قراءة الإرشادات التالية قبل الشروع في الحل:</p>
                        <div className="space-y-2 sm:space-y-3">
                            {instr.rules.map((rule, idx) => (
                                <div key={idx} className="text-sm sm:text-base text-slate-600 font-bold leading-relaxed bg-white/50 p-3 sm:p-4 rounded-xl sm:rounded-2xl border border-slate-200/50 font-arabic">
                                    {rule}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen">
                    {feedback.show && (
                        <div className={`fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-xl shadow-2xl text-white font-bold text-sm ${feedback.type === 'error' ? 'bg-red-600' : 'bg-emerald-700'} animate-fade-in`}>
                            {feedback.message}
                        </div>
                    )}

                    {/* Modal Konfirmasi Submit */}
                    {confirmSubmitModal && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center p-6 bg-slate-900/40 backdrop-blur-sm">
                            <div className="bg-white rounded-[2rem] p-8 max-sm w-full shadow-2xl text-center animate-fade-in">
                                <div className="bg-amber-50 text-amber-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <Icon name="help-circle" size={32} />
                                </div>
                                <h3 className="text-2xl font-black mb-2 font-arabic text-slate-900">تسليم الإجابات؟</h3>
                                <p className="text-slate-500 mb-8 font-medium font-arabic">هل أنت متأكد من إنهاء الاختبار وتسليم جميع الإجابات؟</p>
                                <div className="flex flex-col gap-3">
                                    <button onClick={calculateScore} className="w-full bg-emerald-800 text-white py-4 rounded-2xl font-black font-arabic text-lg shadow-lg shadow-emerald-900/20 hover:bg-emerald-900 transition-all active:scale-95">نعم، تسليم الآن</button>
                                    <button onClick={() => setConfirmSubmitModal(false)} className="w-full bg-slate-100 text-slate-500 py-4 rounded-2xl font-black font-arabic text-lg hover:bg-slate-200 transition-all">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal Hapus */}
                    {deleteModal.show && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center p-6 bg-slate-900/30 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl p-8 max-w-xs w-full shadow-2xl text-center">
                                <Icon name="alert-circle" size={48} className="text-amber-500 mb-4 mx-auto" />
                                <p className="text-xl font-bold mb-6 font-arabic">{deleteModal.message}</p>
                                <div className="flex flex-col gap-2">
                                    <button onClick={deleteModal.onConfirm} className="bg-red-500 text-white py-3 rounded-xl font-bold font-arabic">تأكيد</button>
                                    <button onClick={() => setDeleteModal({ show: false, message: '', onConfirm: null })} className="bg-slate-100 py-3 rounded-xl font-bold font-arabic">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className="bg-emerald-900 text-white p-3 sm:p-4 sticky top-0 z-50 shadow-lg font-arabic">
                        <div className="max-w-6xl mx-auto flex justify-between items-center flex-wrap sm:flex-nowrap gap-2">
                            <h1 className="text-lg sm:text-2xl font-bold flex items-center gap-2 sm:gap-3">
                                <Icon name="book-open" className="text-emerald-300 w-5 h-5 sm:w-6 sm:h-6" />
                                <span>اختبار اللغة العربية</span>
                            </h1>
                            <div className="flex gap-2 sm:gap-4">
                                <button onClick={() => setView('home')} className={`px-2 sm:px-4 py-1 sm:py-1.5 rounded-lg font-arabic text-sm sm:text-base ${view === 'home' ? 'bg-emerald-700 font-bold' : 'hover:bg-emerald-800'}`}>الرئيسية</button>
                                <button onClick={() => setView('test')} className={`px-2 sm:px-4 py-1 sm:py-1.5 rounded-lg font-arabic text-sm sm:text-base ${view === 'test' ? 'bg-emerald-700 font-bold' : 'hover:bg-emerald-800'}`}>الاختبار</button>
                                <button onClick={() => setView('admin')} className={`px-2 sm:px-4 py-1 sm:py-1.5 rounded-lg font-arabic text-sm sm:text-base ${view === 'admin' ? 'bg-emerald-700 font-bold' : 'hover:bg-emerald-800'}`}>الإدارة</button>
                            </div>
                        </div>
                    </nav>

                    <main className="py-6 sm:py-8 px-3 sm:px-6 max-w-6xl mx-auto">
                        {view === 'home' && (
                            <div className="text-center bg-white p-6 sm:p-10 rounded-3xl sm:rounded-[2.5rem] shadow-xl border-b-[6px] sm:border-b-[8px] border-emerald-800 animate-fade-in mx-4 sm:mx-0">
                                <h2 className="text-2xl sm:text-4xl font-black mb-4 font-arabic leading-tight">اختبار قياس الكفاءة اللغوية</h2>
                                <p className="text-base sm:text-lg text-slate-500 mb-6 sm:mb-10 font-arabic">نظام شامل لتقييم مستواك في اللغة العربية عبر مهارات الاستماع والقراءة والمفردات والتراكيب.</p>
                                <div className="bg-slate-50 p-4 sm:p-6 rounded-2xl sm:rounded-3xl mb-8 sm:mb-10 inline-flex items-center gap-4 sm:gap-5 border border-slate-100">
                                    <Icon name="clock" size={36} className="text-emerald-800 w-7 h-7 sm:w-9 sm:h-9" />
                                    <div className="text-right">
                                        <p className="text-xs sm:text-sm text-slate-400 font-bold font-arabic">مدة الاختبار</p>
                                        <p className="text-2xl sm:text-3xl font-black font-arabic">٧٥ دقيقة</p>
                                    </div>
                                </div>
                                <br/>
                                <button onClick={() => setView('test')} className="bg-emerald-700 text-white px-8 sm:px-12 py-3 sm:py-4 rounded-xl sm:rounded-2xl text-lg sm:text-xl font-bold flex items-center gap-3 sm:gap-4 mx-auto hover:bg-emerald-800 shadow-lg font-arabic transition-all active:scale-95">
                                    <Icon name="play-circle" size={28} className="w-6 h-6 sm:w-7 sm:h-7" /> ابدأ الاختبار الآن
                                </button>
                            </div>
                        )}

                        {view === 'admin' && (
                            <div className="max-w-7xl mx-auto text-right space-y-8 animate-fade-in">
                                {!isAdminAuth ? (
                                    <div className="max-w-md mx-auto py-12">
                                        <form onSubmit={handleAdminLogin} className="bg-white p-10 rounded-[2.5rem] shadow-2xl border-t-[8px] border-emerald-800 text-center">
                                            <Icon name="key-round" size={48} className="mx-auto mb-6 text-emerald-800" />
                                            <h2 className="text-2xl font-black mb-6 font-arabic">تسجيل دخول الإدارة</h2>
                                            <input type="password" placeholder="كلمة المرور" className="w-full p-4 bg-slate-50 border rounded-2xl mb-4 text-center outline-none focus:ring-2 focus:ring-emerald-500 font-arabic" value={adminPassInput} onChange={e => setAdminPassInput(e.target.value)} />
                                            <button className="w-full bg-emerald-800 text-white py-4 rounded-2xl font-black font-arabic transition-all active:scale-95">دخول</button>
                                        </form>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                        <div className="space-y-6">
                                            <div className="bg-white p-6 rounded-3xl shadow-lg border">
                                                <h3 className="text-lg font-bold mb-4 flex items-center gap-2 font-arabic"><Icon name="plus-circle" className="text-emerald-600" /> إضافة قسم جديد</h3>
                                                <form onSubmit={handleAddSection} className="space-y-4 font-arabic">
                                                    <input placeholder="عنوان القسم..." required className="w-full p-3 bg-slate-50 border rounded-xl font-bold" value={newSection.title} onChange={e => setNewSection({...newSection, title: e.target.value})} />
                                                    <select className="w-full p-3 bg-slate-50 border rounded-xl font-bold" value={newSection.type} onChange={e => setNewSection({...newSection, type: e.target.value})}>
                                                        <option value="masmu">فهم المسموع</option>
                                                        <option value="maqru">فهم المقروء</option>
                                                        <option value="muradifat">المفردات والتراكيب</option>
                                                    </select>
                                                    {newSection.type === 'masmu' && (
                                                        <div className="border-2 border-dashed p-4 rounded-xl text-center">
                                                            <input type="file" accept="audio/*" className="hidden" id="audio-up" onChange={handleAudioFileChange} />
                                                            <label htmlFor="audio-up" className="cursor-pointer flex flex-col items-center gap-2 text-slate-400">
                                                                <Icon name={isUploading ? "loader-2" : "music"} className={isUploading ? "animate-spin" : ""} />
                                                                <span className="text-xs font-bold">{newSection.mediaUrl ? "تم الرفع ✅" : "رفع ملف صوت (800KB)"}</span>
                                                            </label>
                                                        </div>
                                                    )}
                                                    {newSection.type === 'maqru' && (
                                                        <textarea placeholder="نص القراءة..." className="w-full p-3 bg-slate-50 border rounded-xl h-32" value={newSection.passage} onChange={e => setNewSection({...newSection, passage: e.target.value})} />
                                                    )}
                                                    <button className="w-full bg-emerald-800 text-white py-3 rounded-xl font-bold transition-all active:scale-95">حفظ القسم</button>
                                                </form>
                                            </div>

                                            <div className="bg-amber-50 p-6 rounded-3xl shadow-lg border border-amber-100 font-arabic">
                                                <h3 className="text-lg font-bold mb-4 flex items-center gap-2 text-amber-900"><Icon name="upload-cloud" /> استيراد سريع</h3>
                                                <select className="w-full p-3 mb-4 bg-white border rounded-xl font-bold" value={targetSectionId} onChange={e => setTargetSectionId(e.target.value)}>
                                                    <option value="">اختر القسم...</option>
                                                    {sections.map(s => <option key={s.id} value={s.id}>{s.title}</option>)}
                                                </select>
                                                <textarea placeholder="سؤال | خيار1, خيار2, خيار3, خيار4 | 0" className="w-full p-3 bg-white border rounded-xl h-32 text-sm" value={importText} onChange={e => setImportText(e.target.value)} />
                                                <button onClick={handleQuickImport} className="w-full bg-amber-700 text-white py-3 rounded-xl font-bold mt-4 transition-all active:scale-95">استيراد</button>
                                            </div>
                                            <button onClick={() => setIsAdminAuth(false)} className="w-full text-red-500 font-bold font-arabic hover:underline">تسجيل الخروج</button>
                                        </div>

                                        <div className="lg:col-span-2 space-y-6">
                                            <h3 className="text-xl font-bold font-arabic">الأقسام الحالية ({sections.length})</h3>
                                            {sortedSections.map(sec => (
                                                <div key={sec.id} className="bg-white p-6 rounded-3xl shadow-sm border group font-arabic">
                                                    <div className="flex justify-between items-center mb-4">
                                                        <div className="flex items-center gap-3 flex-1">
                                                            {editingSectionId === sec.id ? (
                                                                <div className="flex items-center gap-2 flex-1 ml-4">
                                                                    <input
                                                                        autoFocus
                                                                        value={editTitleValue}
                                                                        onChange={(e) => setEditTitleValue(e.target.value)}
                                                                        className="flex-1 p-1 px-3 bg-slate-50 border-2 border-emerald-400 rounded-lg font-bold outline-none"
                                                                        onKeyDown={(e) => {
                                                                            if (e.key === 'Enter') handleUpdateSectionTitle(sec.id);
                                                                            if (e.key === 'Escape') setEditingSectionId(null);
                                                                        }}
                                                                    />
                                                                    <button onClick={() => handleUpdateSectionTitle(sec.id)} className="bg-emerald-100 text-emerald-700 p-1.5 rounded-lg hover:bg-emerald-200"><Icon name="check" size={18} /></button>
                                                                    <button onClick={() => setEditingSectionId(null)} className="bg-red-100 text-red-600 p-1.5 rounded-lg hover:bg-red-200"><Icon name="x" size={18} /></button>
                                                                </div>
                                                            ) : (
                                                                <>
                                                                    <h4 className="text-lg font-bold">{sec.title}</h4>
                                                                    <button 
                                                                        onClick={() => { setEditingSectionId(sec.id); setEditTitleValue(sec.title); }}
                                                                        className="text-slate-300 hover:text-emerald-500 transition-colors"
                                                                        title="تعديل العنوان"
                                                                    >
                                                                        <Icon name="pencil" size={16} />
                                                                    </button>
                                                                </>
                                                            )}
                                                            <span className="bg-slate-100 text-[10px] px-2 py-1 rounded font-bold uppercase shrink-0">{sec.type}</span>
                                                        </div>
                                                        <button onClick={() => deleteSection(sec.id)} className="text-slate-300 hover:text-red-500 transition-colors shrink-0"><Icon name="trash-2" size={18} /></button>
                                                    </div>

                                                    <div className="bg-slate-50 p-4 rounded-2xl space-y-4">
                                                        <button onClick={() => setActiveQuestionForm(activeQuestionForm === sec.id ? null : sec.id)} className="text-xs font-bold bg-emerald-100 text-emerald-800 px-3 py-1.5 rounded-lg flex items-center gap-1">
                                                            <Icon name={activeQuestionForm === sec.id ? "x" : "plus"} size={14} /> إضافة سؤال يدوي
                                                        </button>

                                                        {activeQuestionForm === sec.id && (
                                                            <div className="bg-white p-4 rounded-xl border shadow-sm space-y-4">
                                                                <input placeholder="نص السؤال..." className="w-full p-2 bg-slate-50 border rounded-lg font-bold" value={manualQuestion.text} onChange={e => setManualQuestion({...manualQuestion, text: e.target.value})} />
                                                                <div className="grid grid-cols-2 gap-2">
                                                                    {manualQuestion.options.map((opt, idx) => (
                                                                        <input key={idx} placeholder={`خيار ${idx+1}`} className="p-2 bg-slate-50 border rounded-lg text-sm" value={opt} onChange={e => {
                                                                            const oo = [...manualQuestion.options]; oo[idx] = e.target.value;
                                                                            setManualQuestion({...manualQuestion, options: oo});
                                                                        }} />
                                                                    ))}
                                                                </div>
                                                                <select className="w-full p-2 bg-slate-50 border rounded-lg text-sm font-bold" value={manualQuestion.correct} onChange={e => setManualQuestion({...manualQuestion, correct: parseInt(e.target.value)})}>
                                                                    {manualQuestion.options.map((_, i) => <option key={i} value={i}>الخيار {i+1} هو الصحيح</option>)}
                                                                </select>
                                                                <button onClick={() => handleSaveManualQuestion(sec.id)} className="w-full bg-emerald-700 text-white py-2 rounded-lg font-bold transition-all active:scale-95">حفظ السؤال</button>
                                                            </div>
                                                        )}

                                                        <div className="space-y-2 max-h-48 overflow-y-auto custom-scrollbar">
                                                            {sec.questions?.map((q, qIdx) => (
                                                                <div key={qIdx} className="bg-white p-2 px-3 rounded-lg border text-sm flex justify-between items-center group/q">
                                                                    <span className="font-bold">{qIdx+1}. {q.text}</span>
                                                                    <button onClick={() => deleteSpecificQuestion(sec.id, qIdx)} className="text-slate-300 hover:text-red-400"><Icon name="trash-2" size={14}/></button>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'test' && (
                            <div className="max-w-4xl mx-auto pb-40 animate-fade-in">
                                {submitted ? (
                                    /* TAMPILAN HASIL UJIAN */
                                    <div className="bg-white rounded-[3rem] shadow-2xl p-12 border-t-[12px] border-emerald-800 text-center animate-fade-in overflow-hidden relative">
                                        <div className="absolute top-0 left-0 w-full h-2 bg-emerald-50"></div>
                                        
                                        <div className={`w-28 h-28 rounded-full ${gradeInfo.bg} ${gradeInfo.color} flex items-center justify-center mx-auto mb-8 shadow-inner`}>
                                            <Icon name="award" size={56} strokeWidth={2.5} />
                                        </div>
                                        
                                        <h2 className="text-4xl font-black mb-2 font-arabic text-slate-900">انتهى الاختبار!</h2>
                                        <p className="text-slate-400 font-medium mb-10 text-lg font-arabic">لقد تم حساب نتيجتك النهائية بناءً على أدائك</p>

                                        <div className="mb-12">
                                            <div className="text-8xl font-black text-emerald-800 mb-4 drop-shadow-sm font-arabic tracking-tighter">{score}</div>
                                            <div className={`text-2xl font-black px-10 py-3 rounded-2xl ${gradeInfo.bg} ${gradeInfo.color} inline-block border-2 border-current font-arabic`}>
                                                {gradeInfo.text}
                                            </div>
                                        </div>

                                        <div className="flex flex-col sm:flex-row gap-4 justify-center items-center font-arabic">
                                            <button onClick={() => setView('home')} className="w-full sm:w-auto bg-slate-100 text-slate-600 px-12 py-4 rounded-2xl font-black text-lg hover:bg-slate-200 transition-all flex items-center justify-center gap-3">
                                                <Icon name="home" size={20} /> الرئيسية
                                            </button>
                                            <button onClick={() => setShowReview(!showReview)} className="w-full sm:w-auto bg-emerald-800 text-white px-12 py-4 rounded-2xl font-black text-lg hover:bg-emerald-900 shadow-lg shadow-emerald-900/20 transition-all flex items-center justify-center gap-3">
                                                <Icon name="search" size={20} /> {showReview ? "إخفاء المراجعة" : "مراجعة الإجابات"}
                                            </button>
                                        </div>
                                        
                                        {/* FITUR REVIEW JAWABAN */}
                                        {showReview && (
                                            <div className="mt-20 text-right space-y-16 animate-fade-in border-t pt-16 font-arabic">
                                                <div className="flex items-center gap-4 justify-center mb-8">
                                                    <div className="h-[2px] bg-emerald-100 flex-1"></div>
                                                    <h3 className="text-3xl font-black text-emerald-900 px-4">تفاصيل المراجعة</h3>
                                                    <div className="h-[2px] bg-emerald-100 flex-1"></div>
                                                </div>

                                                {sortedSections.map(sec => (
                                                    <div key={sec.id} className="bg-slate-50/50 p-8 rounded-[2.5rem] border border-slate-100 text-right space-y-10">
                                                        <div className="flex items-center gap-4 mb-4 border-b pb-6 border-slate-200/50">
                                                            <div className="bg-emerald-100 text-emerald-800 p-2 rounded-xl">
                                                                <Icon name={sec.type === 'masmu' ? 'headphones' : sec.type === 'maqru' ? 'book-open' : 'type'} size={24} />
                                                            </div>
                                                            <h4 className="text-2xl font-black text-slate-800">{sec.title}</h4>
                                                        </div>

                                                        <div className="space-y-12">
                                                            {sec.questions?.map((q, qIdx) => {
                                                                const userAns = answers[`${sec.id}_${qIdx}`];
                                                                const isCorrect = userAns === q.correct;
                                                                return (
                                                                    <div key={qIdx} className="space-y-6">
                                                                        <div className="flex items-start gap-4">
                                                                            <div className={`w-8 h-8 rounded-lg flex items-center justify-center text-white shrink-0 mt-1 font-black ${isCorrect ? 'bg-emerald-500' : 'bg-red-500'}`}>
                                                                                {isCorrect ? <Icon name="check" size={16} /> : <Icon name="x" size={16} />}
                                                                            </div>
                                                                            <h5 className="text-xl font-bold text-slate-800 leading-relaxed">
                                                                                <span className="text-slate-400 ml-2 font-medium">{qIdx + 1}.</span> {q.text}
                                                                            </h5>
                                                                        </div>

                                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mr-12">
                                                                            {q.options.map((opt, oIdx) => {
                                                                                let statusClass = "bg-white border-slate-100 text-slate-400";
                                                                                if (oIdx === q.correct) {
                                                                                    statusClass = "bg-emerald-50 border-emerald-500 text-emerald-900 font-bold ring-4 ring-emerald-50";
                                                                                } else if (oIdx === userAns && !isCorrect) {
                                                                                    statusClass = "bg-red-50 border-red-500 text-red-900 font-bold ring-4 ring-red-50";
                                                                                }

                                                                                return (
                                                                                    <div key={oIdx} className={`p-5 rounded-2xl text-lg border-2 flex items-center justify-between transition-all ${statusClass}`}>
                                                                                        <span>{opt}</span>
                                                                                        {oIdx === q.correct && <Icon name="check-circle-2" className="text-emerald-600" size={20} />}
                                                                                        {oIdx === userAns && !isCorrect && <Icon name="x-circle" className="text-red-600" size={20} />}
                                                                                    </div>
                                                                                );
                                                                            })}
                                                                        </div>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    /* TAMPILAN PENGERJAAN SOAL */
                                    <>
                                        <div className="sticky top-[80px] z-40 flex justify-center mb-8 font-arabic">
                                            <div className={`flex items-center gap-2 px-4 py-1.5 rounded-full shadow-md border-2 bg-white/90 backdrop-blur transition-all ${timeLeft < 300 ? 'border-red-500 text-red-600' : 'border-emerald-600 text-emerald-800'}`}>
                                                <Icon name="clock" size={18} className={timeLeft < 300 ? 'animate-pulse' : ''} />
                                                <span className="text-lg font-bold tracking-widest" dir="ltr">
                                                    {Math.floor(timeLeft / 60)}:{(timeLeft % 60).toString().padStart(2, '0')}
                                                </span>
                                            </div>
                                        </div>

                                        <div className="space-y-16">
                                            {sortedSections.length === 0 ? (
                                                <div className="text-center p-24 bg-white rounded-[3rem] shadow-sm border border-dashed font-arabic">
                                                    <Icon name="database" size={48} className="text-slate-200 mx-auto mb-4" />
                                                    <p className="text-slate-400 font-bold italic text-lg">لم يتم إضافة أي أسئلة بعد.</p>
                                                </div>
                                            ) : (
                                                (() => {
                                                    const renderedInstructions = new Set();
                                                    return sortedSections.map(sec => {
                                                        const showInstr = !renderedInstructions.has(sec.type);
                                                        if (showInstr) renderedInstructions.add(sec.type);
                                                        
                                                        return (
                                                            <React.Fragment key={sec.id}>
                                                                {showInstr && renderInstructions(sec.type)}
                                                                
                                                                <div className="bg-white p-5 sm:p-10 rounded-3xl sm:rounded-[3rem] shadow-xl border border-slate-100 text-right animate-fade-in font-arabic mx-4 sm:mx-0">
                                                                    <div className="flex flex-col-reverse sm:flex-row justify-between sm:items-center gap-4 mb-6 sm:mb-8 border-b pb-4 sm:pb-6 border-slate-50">
                                                                        <div className="bg-emerald-50 text-emerald-800 px-4 sm:px-5 py-1.5 sm:py-2 rounded-xl sm:rounded-2xl text-xs sm:text-sm font-black uppercase tracking-wide self-start sm:self-auto">
                                                                            {sec.type === 'masmu' ? 'فهم المسموع' : sec.type === 'maqru' ? 'فهم المقروء' : 'المفردات والتراكيب'}
                                                                        </div>
                                                                        <h3 className="text-2xl sm:text-3xl font-black text-slate-800 leading-tight">{sec.title}</h3>
                                                                    </div>
                                                                    
                                                                    {sec.passage && (
                                                                        <div className="bg-amber-50/50 p-5 sm:p-8 rounded-2xl sm:rounded-3xl mb-6 sm:mb-10 leading-relaxed text-base sm:text-xl border-r-4 sm:border-r-8 border-amber-400 text-slate-800 text-justify font-medium shadow-inner">
                                                                            {sec.passage}
                                                                        </div>
                                                                    )}
                                                                    
                                                                    {sec.mediaUrl && (
                                                                        <div className="bg-emerald-50/50 p-4 sm:p-6 rounded-2xl sm:rounded-3xl mb-6 sm:mb-10 border border-emerald-100 flex flex-col items-center gap-3 sm:gap-4">
                                                                        <div className="bg-white p-2 sm:p-3 rounded-full shadow-sm text-emerald-700">
                                                                                <Icon name="headphones" size={28} />
                                                                            </div>
                                                                            <audio controls src={sec.mediaUrl} className="w-full max-w-md h-10 sm:h-14" />
                                                                        </div>
                                                                    )}

                                                                    <div className="space-y-10 sm:space-y-16">
                                                                        {sec.questions?.map((q, idx) => (
                                                                            <div key={idx} className="space-y-5 sm:space-y-8 animate-fade-in">
                                                                                <h4 className="text-lg sm:text-2xl font-bold flex gap-3 sm:gap-4 text-slate-800">
                                                                                    <span className="bg-slate-900 text-white w-8 h-8 sm:w-10 sm:h-10 rounded-xl sm:rounded-2xl flex items-center justify-center shrink-0 text-sm sm:text-lg shadow-lg">{idx + 1}</span>
                                                                                    <span className="leading-snug pt-1 sm:pt-0">{q.text}</span>
                                                                                </h4>
                                                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3 sm:gap-5 mr-2 sm:mr-14">
                                                                                    {q.options.map((opt, oIdx) => (
                                                                                        <button key={oIdx} onClick={() => setAnswers(prev => ({...prev, [`${sec.id}_${idx}`]: oIdx}))} 
                                                                                            className={`p-4 sm:p-6 rounded-2xl sm:rounded-3xl border-2 text-right text-base sm:text-xl transition-all flex justify-between items-center group ${answers[`${sec.id}_${idx}`] === oIdx ? 'border-emerald-700 bg-emerald-50 text-emerald-900 font-bold shadow-md sm:shadow-lg ring-2 sm:ring-4 ring-emerald-50' : 'bg-slate-50 border-slate-100 hover:bg-white hover:border-emerald-200 hover:shadow-md'}`}>
                                                                                            <span className="flex-1 leading-tight pl-2 sm:pl-0">{opt}</span>
                                                                                            <div className={`w-6 h-6 sm:w-8 sm:h-8 rounded-lg sm:rounded-xl border-2 flex items-center justify-center shrink-0 transition-all ${answers[`${sec.id}_${idx}`] === oIdx ? 'border-emerald-700 bg-emerald-700 text-white' : 'border-slate-300 bg-white group-hover:border-emerald-300'}`}>
                                                                                                {answers[`${sec.id}_${idx}`] === oIdx && <Icon name="check" size={14} strokeWidth={3} className="sm:w-4 sm:h-4" />}
                                                                                            </div>
                                                                                        </button>
                                                                                    ))}
                                                                                </div>
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                </div>
                                                            </React.Fragment>
                                                        );
                                                    });
                                                })()
                                            )}
                                            
                                            {sections.length > 0 && (
                                                <div className="fixed bottom-0 left-0 right-0 p-4 sm:p-8 bg-white/95 backdrop-blur-xl border-t shadow-2xl flex justify-center z-40">
                                                    <button onClick={() => setConfirmSubmitModal(true)} className="w-full max-w-sm sm:max-w-none sm:w-auto bg-emerald-800 text-white px-8 sm:px-24 py-4 sm:py-5 rounded-2xl sm:rounded-[2rem] text-xl sm:text-3xl font-black shadow-xl shadow-emerald-900/20 hover:bg-emerald-900 transform active:scale-95 transition-all font-arabic">
                                                        تسليم الإجابات
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    </>
                                )}
                            </div>
                        )}
                    </main>

                    <footer className="bg-slate-900 text-slate-500 p-16 text-center mt-24 font-arabic">
                        <div className="max-w-4xl mx-auto">
                            <div className="bg-emerald-800/20 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-emerald-800/10 shadow-inner">
                                <Icon name="book-open" className="text-emerald-500" size={32} />
                            </div>
                            <p className="text-3xl font-black text-white mb-3">اختبار اللغة العربية المتكامل</p>
                            <p className="text-xl font-bold opacity-60">نتمنى لكم التوفيق والنجاح في مسيرتكم التعليمية</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
