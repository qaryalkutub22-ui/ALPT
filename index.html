<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار اللغة العربية</title>
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel Standalone -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .font-arabic { font-family: 'Tajawal', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#FDFDFD] text-slate-800 overflow-x-hidden">
    <div id="root"></div>

    <!-- Integrasi Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Konfigurasi Firebase Proyek Anda
        const firebaseConfig = {
            apiKey: "AIzaSyDQYYLRfvLFvk023FSflKDi6hQUSX4Jed4",
            authDomain: "arabic-language-placement-test.firebaseapp.com",
            projectId: "arabic-language-placement-test",
            storageBucket: "arabic-language-placement-test.firebasestorage.app",
            messagingSenderId: "431606829904",
            appId: "1:431606829904:web:81705ff38610fb4bd31255"
        };

        // Inisialisasi Layanan
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "arabic-language-placement-test";

        // Mengekspos API ke Global window agar bisa diakses oleh skrip Babel
        window.FirebaseEnv = { 
            auth, db, appId, 
            collection, addDoc, onSnapshot, query, doc, deleteDoc, updateDoc, 
            signInAnonymously, onAuthStateChanged 
        };
    </script>

    <!-- Logika Aplikasi React -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = window.React;
        
        // Komponen Helper untuk Ikon Lucide - Diperbaiki untuk mencegah Galat toSvg dan removeChild
        const Icon = ({ name, size = 24, className = "", strokeWidth = 2 }) => {
            const containerRef = useRef(null);

            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    // Bersihkan kontainer dan buat elemen i baru untuk diproses Lucide
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    
                    window.lucide.createIcons({
                        elements: [containerRef.current.firstChild],
                        attrs: {
                            width: size,
                            height: size,
                            'stroke-width': strokeWidth,
                            class: className
                        }
                    });
                }
            }, [name, size, className, strokeWidth]);

            // Gunakan span sebagai kontainer statis agar React tidak bingung saat rekonsiliasi DOM
            return <span ref={containerRef} className="inline-flex items-center justify-center leading-none"></span>;
        };

        const SECTION_INSTRUCTIONS = {
            masmu: {
                header: "القسم الأول: فهم المسموع",
                rules: [
                    "١- يتكون هذا القسم من أربعة نصوص استماع.",
                    "٢- تحت كل نص مجموعة أسئلة من نوع الاختيار من متعدد.",
                    "٣- اقرأ الأسئلة قبل الاستماع إلى النص.",
                    "٤- تحت كل سؤال أربعة خيارات، خيار واحد منها صحيح.",
                    "٥- عند اختيار الإجابة التي ترى أنها صحيحة، قم بالضغط عليها."
                ]
            },
            maqru: {
                header: "القسم الثاني: فهم المقروء",
                rules: [
                    "١- يتكون هذا القسم من ثلاثة نصوص.",
                    "٢- تحت كل نص توجد أسئلة من نوع الاختيار من متعدد.",
                    "٣- تحت كل سؤال أربعة خيارات، خيار واحد منها صحيح.",
                    "٤- عند اختيار الإجابة التي ترى أنها صحيحة، قم بالضغط عليها."
                ]
            },
            muradifat: {
                header: "القسم الثالث: اختبار المفردات والتراكيب",
                rules: [
                    "١- يتكون هذا القسم من ٣٥ سؤالاً.",
                    "٢- تحت كل سؤال أربعة خيارات، خيار واحد منها صحيح.",
                    "٣- عند اختيار الإجابة التي ترى أنها صحيحة، قم بالضغط عليها."
                ]
            }
        };

        const CATEGORY_ORDER = { masmu: 1, maqru: 2, muradifat: 3 };

        const App = () => {
            const [env, setEnv] = useState(null);
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home'); 
            const [sections, setSections] = useState([]);
            const [answers, setAnswers] = useState({});
            const [submitted, setSubmitted] = useState(false);
            const [score, setScore] = useState(0);
            const [timeLeft, setTimeLeft] = useState(50 * 60);
            const [timerActive, setTimerActive] = useState(false);
            const [isAdminAuth, setIsAdminAuth] = useState(false);
            const [adminPassInput, setAdminPassInput] = useState('');
            const [showReview, setShowReview] = useState(false);
            const [feedback, setFeedback] = useState({ show: false, message: '', type: 'info' });

            useEffect(() => {
                const checkEnv = setInterval(() => {
                    if (window.FirebaseEnv) {
                        setEnv(window.FirebaseEnv);
                        clearInterval(checkEnv);
                    }
                }, 100);
                return () => clearInterval(checkEnv);
            }, []);

            useEffect(() => {
                if (!env) return;
                const { auth, signInAnonymously, onAuthStateChanged } = env;
                signInAnonymously(auth).catch(err => console.error("Auth error:", err));
                const unsubscribe = onAuthStateChanged(auth, (u) => setUser(u));
                return () => unsubscribe();
            }, [env]);

            useEffect(() => {
                if (!env || !user) return;
                const { db, appId, collection, query, onSnapshot } = env;
                const sectionsRef = collection(db, 'artifacts', appId, 'public', 'data', 'sections');
                
                const unsubscribe = onSnapshot(query(sectionsRef), (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setSections(data);
                }, (err) => {
                    console.error("Firestore Error:", err);
                    showFeedback("Gagal memuat data dari database", "error");
                });
                return () => unsubscribe();
            }, [env, user]);

            useEffect(() => {
                let timer;
                if (view === 'test' && timerActive && timeLeft > 0 && !submitted) {
                    timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                } else if (timeLeft === 0 && timerActive && !submitted) {
                    calculateScore();
                }
                return () => clearInterval(timer);
            }, [view, timerActive, timeLeft, submitted]);

            useEffect(() => {
                if (view === 'test' && !submitted) setTimerActive(true);
                else if (view === 'home') {
                    setTimeLeft(50 * 60);
                    setTimerActive(false);
                    setShowReview(false);
                }
            }, [view, submitted]);

            const showFeedback = (msg, type = 'info') => {
                setFeedback({ show: true, message: msg, type });
                setTimeout(() => setFeedback({ show: false, message: '', type: 'info' }), 4000);
            };

            const calculateScore = () => {
                let total = 0;
                let correctCount = 0;
                sections.forEach(sec => {
                    sec.questions?.forEach((q, idx) => {
                        total++;
                        if (answers[`${sec.id}_${idx}`] === q.correct) correctCount++;
                    });
                });
                setScore(total > 0 ? Math.round((correctCount / total) * 100) : 0);
                setSubmitted(true);
                setTimerActive(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminPassInput === 'admin123') {
                    setIsAdminAuth(true);
                    showFeedback("Berhasil masuk sebagai admin", "success");
                } else {
                    showFeedback("Kata sandi salah", "error");
                }
            };

            const getGradeInfo = (s) => {
                if (s >= 95) return { text: "ممتاز مرتفع", color: "text-emerald-600", bg: "bg-emerald-50" };
                if (s >= 90) return { text: "ممتاز", color: "text-emerald-500", bg: "bg-emerald-50" };
                if (s >= 85) return { text: "جيد جداً مرتفع", color: "text-blue-600", bg: "bg-blue-50" };
                if (s >= 80) return { text: "جيد جداً", color: "text-blue-500", bg: "bg-blue-50" };
                if (s >= 75) return { text: "جيد مرتفع", color: "text-indigo-600", bg: "bg-indigo-50" };
                if (s >= 70) return { text: "جيد", color: "text-indigo-500", bg: "bg-indigo-50" };
                if (s >= 65) return { text: "مقبول مرتفع", color: "text-amber-600", bg: "bg-amber-50" };
                if (s >= 60) return { text: "مقبول", color: "text-amber-500", bg: "bg-amber-50" };
                return { text: "راسب", color: "text-red-600", bg: "bg-red-50" };
            };

            const gradeInfo = getGradeInfo(score);
            const sortedSections = [...sections].sort((a, b) => (CATEGORY_ORDER[a.type] || 9) - (CATEGORY_ORDER[b.type] || 9));

            if (!env) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen bg-slate-50">
                        <Icon name="loader-2" className="animate-spin text-emerald-800" size={64} />
                        <p className="mt-4 font-bold text-slate-600">Menghubungkan ke server...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    {feedback.show && (
                        <div className={`fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-xl shadow-2xl text-white font-bold text-sm ${feedback.type === 'error' ? 'bg-red-600' : 'bg-emerald-700'} animate-bounce`}>
                            {feedback.message}
                        </div>
                    )}

                    <nav className="bg-emerald-900 text-white p-4 sticky top-0 z-50 shadow-lg">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl sm:text-2xl font-bold flex items-center gap-3">
                                <Icon name="book-open" className="text-emerald-300" />
                                <span className="font-arabic">اختبار اللغة العربية</span>
                            </h1>
                            <div className="flex gap-4">
                                <button onClick={() => setView('home')} className={`px-4 py-1.5 rounded-lg transition-colors font-arabic ${view === 'home' ? 'bg-emerald-700 font-bold' : 'hover:bg-emerald-800'}`}>الرئيسية</button>
                                <button onClick={() => setView('test')} className={`px-4 py-1.5 rounded-lg transition-colors font-arabic ${view === 'test' ? 'bg-emerald-700 font-bold' : 'hover:bg-emerald-800'}`}>الاختبار</button>
                                <button onClick={() => setView('admin')} className={`px-4 py-1.5 rounded-lg transition-colors font-arabic ${view === 'admin' ? 'bg-emerald-700 font-bold' : 'hover:bg-emerald-800'}`}>الإدارة</button>
                            </div>
                        </div>
                    </nav>

                    <main className="py-8 px-6 max-w-6xl mx-auto">
                        {view === 'home' && (
                            <div className="text-center bg-white p-10 rounded-[2.5rem] shadow-xl border-b-[8px] border-emerald-800">
                                <h2 className="text-4xl font-black mb-4 font-arabic">اختبار قياس الكفاءة اللغوية</h2>
                                <p className="text-lg text-slate-500 mb-10 font-arabic">نظام شامل لتقييم مستواك في اللغة العربية عبر مهارات الاستماع والقراءة والمفردات.</p>
                                <div className="bg-slate-50 p-6 rounded-3xl mb-10 inline-flex items-center gap-5 border border-slate-100">
                                    <Icon name="clock" size={36} className="text-emerald-800" />
                                    <div className="text-right">
                                        <p className="text-sm text-slate-400 font-bold font-arabic">مدة الاختبار</p>
                                        <p className="text-3xl font-black font-arabic">٥٠ دقيقة</p>
                                    </div>
                                </div>
                                <br/>
                                <button onClick={() => setView('test')} className="bg-emerald-700 text-white px-12 py-4 rounded-2xl text-xl font-bold flex items-center gap-4 mx-auto hover:bg-emerald-800 shadow-lg transform active:scale-95 transition-all font-arabic">
                                    <Icon name="play-circle" size={28} /> ابدأ الاختبار الآن
                                </button>
                            </div>
                        )}

                        {view === 'admin' && (
                            <div className="max-w-md mx-auto py-12">
                                {!isAdminAuth ? (
                                    <form onSubmit={handleAdminLogin} className="bg-white p-10 rounded-[2.5rem] shadow-2xl border-t-[8px] border-emerald-800 text-center">
                                        <Icon name="key-round" size={48} className="mx-auto mb-6 text-emerald-800" />
                                        <h2 className="text-2xl font-black mb-6 font-arabic">تسجيل دخول الإدارة</h2>
                                        <input type="password" placeholder="كلمة المرور" className="w-full p-4 bg-slate-50 border rounded-2xl mb-4 text-center focus:ring-2 focus:ring-emerald-500 outline-none font-arabic" value={adminPassInput} onChange={e => setAdminPassInput(e.target.value)} />
                                        <button className="w-full bg-emerald-800 text-white py-4 rounded-2xl font-black hover:bg-emerald-900 transition-colors font-arabic">دخول</button>
                                    </form>
                                ) : (
                                    <div className="text-center bg-white p-10 rounded-3xl shadow-xl">
                                        <Icon name="settings" size={64} className="mx-auto mb-6 text-emerald-800" />
                                        <h2 className="text-2xl font-bold mb-4 font-arabic">أهلاً بك في لوحة التحكم</h2>
                                        <p className="text-slate-500 font-arabic">Anda dapat mengelola soal melalui editor asli atau dashboard Firestore.</p>
                                        <button onClick={() => setIsAdminAuth(false)} className="mt-8 text-red-500 font-bold hover:underline font-arabic">تسجيل الخروج</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'test' && (
                            <div className="max-w-4xl mx-auto pb-40">
                                {submitted ? (
                                    <div className="bg-white rounded-[2.5rem] shadow-2xl p-10 border-t-[12px] border-emerald-800 text-center animate-in fade-in zoom-in duration-500">
                                        <Icon name="award" size={64} className={`${gradeInfo.color} mx-auto mb-6`} />
                                        <h2 className="text-4xl font-black mb-4 font-arabic">انتهى الاختبار!</h2>
                                        <div className="text-8xl font-black text-emerald-700 mb-4 font-arabic">{score}</div>
                                        <div className={`text-3xl font-black px-10 py-3.5 rounded-[1.5rem] ${gradeInfo.bg} ${gradeInfo.color} inline-block border-2 border-current font-arabic`}>
                                            {gradeInfo.text}
                                        </div>
                                        <div className="mt-10 flex gap-4 justify-center">
                                            <button onClick={() => {setAnswers({}); setSubmitted(false); setView('home');}} className="bg-slate-100 px-8 py-3 rounded-xl font-bold hover:bg-slate-200 transition-colors font-arabic">الرئيسية</button>
                                            <button onClick={() => setShowReview(!showReview)} className="bg-emerald-800 text-white px-8 py-3 rounded-xl font-bold hover:bg-emerald-900 transition-colors font-arabic">مراجعة الإجابات</button>
                                        </div>
                                    </div>
                                ) : (
                                    <>
                                        <div className="sticky top-[80px] z-40 flex justify-center mb-10 font-arabic">
                                            <div className={`flex items-center gap-4 px-8 py-3.5 rounded-full shadow-xl border-2 bg-white transition-colors ${timeLeft < 300 ? 'border-red-500 text-red-600' : 'border-emerald-800'}`}>
                                                <Icon name="clock" />
                                                <span className="text-3xl font-black font-arabic">
                                                    {Math.floor(timeLeft / 60)}:{(timeLeft % 60).toString().padStart(2, '0')}
                                                </span>
                                            </div>
                                        </div>
                                        
                                        <div className="space-y-12">
                                            {sortedSections.length === 0 ? (
                                                <div className="text-center p-20 bg-white rounded-3xl shadow-sm">
                                                    <p className="text-slate-400 font-bold italic font-arabic">Tidak ada soal tersedia di database saat ini.</p>
                                                </div>
                                            ) : (
                                                sortedSections.map(sec => (
                                                    <div key={sec.id} className="bg-white p-8 rounded-[2rem] shadow-lg border animate-in fade-in slide-in-from-bottom-4 duration-700 text-right">
                                                        <div className="flex justify-between items-center mb-6 border-b pb-4">
                                                            <h3 className="text-2xl font-black text-emerald-900 font-arabic">{sec.title}</h3>
                                                            <span className="bg-emerald-100 text-emerald-800 px-3 py-1 rounded-lg text-xs font-bold uppercase font-arabic">
                                                                {sec.type === 'masmu' ? 'استماع' : sec.type === 'maqru' ? 'قراءة' : 'مفردات'}
                                                            </span>
                                                        </div>
                                                        {sec.passage && <div className="bg-amber-50 p-6 rounded-2xl mb-8 leading-relaxed text-lg border-r-4 border-amber-400 font-arabic">{sec.passage}</div>}
                                                        {sec.mediaUrl && (
                                                            <div className="bg-emerald-50 p-4 rounded-xl mb-8 border border-emerald-100">
                                                                <audio controls src={sec.mediaUrl} className="w-full" />
                                                            </div>
                                                        )}
                                                        <div className="space-y-12">
                                                            {sec.questions?.map((q, idx) => (
                                                                <div key={idx} className="space-y-6">
                                                                    <h4 className="text-xl font-bold flex gap-3 font-arabic">
                                                                        <span className="bg-slate-800 text-white w-8 h-8 rounded-lg flex items-center justify-center shrink-0 text-sm font-arabic">{idx + 1}</span>
                                                                        <span>{q.text}</span>
                                                                    </h4>
                                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                                        {q.options.map((opt, oIdx) => (
                                                                            <button key={oIdx} onClick={() => setAnswers(prev => ({...prev, [`${sec.id}_${idx}`]: oIdx}))} 
                                                                                className={`p-5 rounded-xl border-2 text-right transition-all flex justify-between items-center font-arabic ${answers[`${sec.id}_${idx}`] === oIdx ? 'border-emerald-700 bg-emerald-50 font-bold ring-4 ring-emerald-100' : 'bg-slate-50 border-slate-100 hover:border-emerald-300'}`}>
                                                                                <span>{opt}</span>
                                                                                <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center ${answers[`${sec.id}_${idx}`] === oIdx ? 'border-emerald-700 bg-emerald-700' : 'border-slate-300 bg-white'}`}>
                                                                                    {answers[`${sec.id}_${idx}`] === oIdx && <div className="w-2 h-2 bg-white rounded-full"></div>}
                                                                                </div>
                                                                            </button>
                                                                        ))}
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                ))
                                            )}

                                            {sections.length > 0 && (
                                                <div className="fixed bottom-0 left-0 right-0 p-6 bg-white/95 backdrop-blur-md border-t shadow-2xl flex justify-center z-40 font-arabic">
                                                    <button onClick={() => {
                                                        if(confirm("هل أنت متأكد من تسليم الإجابات؟")) calculateScore();
                                                    }} className="bg-emerald-800 text-white px-20 py-4 rounded-2xl text-2xl font-black shadow-lg hover:bg-emerald-900 transform active:scale-95 transition-all font-arabic">
                                                        تسليم الإجابات
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    </>
                                )}
                            </div>
                        )}
                    </main>

                    <footer className="bg-slate-900 text-slate-500 p-12 text-center mt-20">
                        <div className="max-w-4xl mx-auto">
                            <div className="bg-emerald-800/20 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-emerald-800/10">
                                <Icon name="book-open" className="text-emerald-500" size={28} />
                            </div>
                            <p className="text-2xl font-black text-white mb-2 font-arabic">اختبار اللغة العربية المتكامل</p>
                            <p className="text-lg font-bold opacity-60 font-arabic">نتمنى لكم التوفيق والنجاح في مسيرتكم التعليمية</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
